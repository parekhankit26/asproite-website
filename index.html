<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asproite — Cloud & IT Consultancy</title>
    <meta name="description" content="Asproite delivers end-to-end IT solutions — cloud, AI, web development, and hardware decommissioning — trusted by organisations across the UK for over 25 years." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
    <script>
      // The site used to run on hash-based routing (/#/about). Old bookmarks,
      // shared links, or cached search results may still point at that
      // format — redirect them to the equivalent clean URL before React
      // even loads, so they land on the right page instead of the homepage.
      (function () {
        var h = window.location.hash;
        if (h.indexOf('#/') === 0) {
          window.location.replace(h.slice(1) + window.location.search);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
